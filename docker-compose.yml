services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalisa
      POSTGRES_PASSWORD: catalisa123
      POSTGRES_DB: catalisa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://catalisa:catalisa123@db:5432/catalisa_db
      AB_URL_EVEN: ${AB_URL_EVEN:-https://catalisa-frontend-mt.vercel.app}
      AB_URL_ODD: ${AB_URL_ODD:-https://gemini.google.com/app}
    depends_on:
      - db
    volumes:
      - ./backend:/app
volumes:
  postgres_data: